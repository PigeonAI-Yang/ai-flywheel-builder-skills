<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --paper: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #2557a7;
      --soft: #eef3fb;
      --risk: #8a4b0f;
      --ok: #166534;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      line-height: 1.75;
    }
    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 64px;
    }
    .cover, section {
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 28px;
      margin-bottom: 16px;
    }
    .kicker {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 12px 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 14px;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: 0;
    }
    p { margin: 0 0 12px; }
    ul, ol { margin: 0; padding-left: 1.3em; }
    li + li { margin-top: 6px; }
    .summary {
      color: var(--muted);
      font-size: 16px;
      max-width: 720px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .note {
      background: var(--soft);
      border-left: 4px solid var(--accent);
      padding: 14px 16px;
    }
    .risk {
      color: var(--risk);
    }
    .ok {
      color: var(--ok);
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      word-break: break-all;
    }
    code {
      background: #f1f3f6;
      padding: 2px 5px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.92em;
    }
    details {
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 16px 20px;
    }
    @media (max-width: 720px) {
      main { width: min(100% - 20px, 960px); padding-top: 20px; }
      .cover, section { padding: 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header class="cover">
      <div class="kicker">{{kicker}}</div>
      <h1>{{title}}</h1>
      <p class="summary">{{summary}}</p>
    </header>

    <section>
      <h2>本轮实践一句话</h2>
      {{one_sentence}}
    </section>

    <section>
      <h2>为什么值得讲</h2>
      {{why_it_matters}}
    </section>

    <section>
      <h2>信息增量</h2>
      {{information_gain}}
    </section>

    <section>
      <h2>内容框架稿</h2>
      {{content_framework}}
    </section>

    <section>
      <h2>可发布内容草稿</h2>
      {{publishable_draft}}
    </section>

    <section>
      <h2>配套可领取产物</h2>
      {{claimable_asset}}
    </section>

    <section class="grid">
      <div>
        <h2>证据与边界</h2>
        {{proof_and_boundary}}
      </div>
      <div>
        <h2>反馈入口</h2>
        {{feedback_entry}}
      </div>
    </section>

    <section>
      <h2>下一轮实践</h2>
      {{next_practice}}
    </section>
  </main>
</body>
</html>
